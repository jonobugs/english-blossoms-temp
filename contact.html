<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>お問い合わせ | English Blossoms</title>

    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/contact.css" />
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo-container">
            <img src="images/logo.svg" alt="English Blossoms" class="logo" />
        </div>
        <nav class="nav centered">
            <a href="index.html">ホーム</a>
            <a href="courses.html">コース・料金</a>
            <a href="calendar.html">年間</a>
            <a href="contact.html" class="active">お問い合わせ</a>
        </nav>
    </header>

    <!-- CONTACT SECTION -->
    <section>
        <h1>お問い合わせ</h1>

        <p class="contact-intro">
            ご質問や体験レッスンのお申し込みは、以下のフォームからお気軽にご連絡ください。
        </p>

        <!-- CONTACT FORM -->
        <form action="https://formspree.io/f/xeewlynb" method="POST" id="contact-form" class="contact-form">

            <!-- Honeypot -->
            <input type="text" name="website" class="honeypot">

            <label>
                お名前 <span class="required">※必須</span>
                <input type="text" name="name" required>
            </label>

            <label>
                メールアドレス <span class="required">※必須</span>
                <input type="email" name="email" required>
            </label>

            <label>
                メッセージ <span class="required">※必須</span>
                <textarea name="message" required></textarea>
            </label>

            <button type="submit" class="submit-button">送信する</button>

            <p class="privacy">
                ※ ご入力いただいた情報はお問い合わせ対応のみに使用し、第三者に提供することはありません。
            </p>
        </form>

        <!-- STATUS MESSAGES (hidden until triggered) -->
        <div id="sending-message" class="sending-message hidden">
            送信中です。少々お待ちください…
        </div>

        <div id="success-message" class="success-message hidden">
            送信が完了しました。ありがとうございます！
        </div>

    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 English Blossoms</p>
    </footer>

    <!-- CONTACT FORM SCRIPT -->
    <script>
        const form = document.getElementById("contact-form");
        const success = document.getElementById("success-message");
        const sending = document.getElementById("sending-message");
        const submitBtn = form.querySelector("button[type='submit']");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            sending.classList.remove("hidden");
            success.classList.add("hidden");

            submitBtn.disabled = true;
            submitBtn.textContent = "送信中…";

            const formData = new FormData(form);

            try {
                const response = await fetch("https://formspree.io/f/xeewlynb", {
                    method: "POST",
                    body: formData,
                    headers: { "Accept": "application/json" }
                });

                if (response.ok) {
                    form.reset();
                    sending.classList.add("hidden");
                    success.classList.remove("hidden");

                    submitBtn.disabled = false;
                    submitBtn.textContent = "送信する";

                    setTimeout(() => {
                        success.classList.add("hidden");
                    }, 5000);
                } else {
                    throw new Error("Server error");
                }
            } catch (err) {
                sending.classList.add("hidden");
                alert("送信に失敗しました。もう一度お試しください。");

                submitBtn.disabled = false;
                submitBtn.textContent = "送信する";
            }
        });
    </script>

</body>

</html>
