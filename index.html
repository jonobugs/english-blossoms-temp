<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Blossoms</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles/main.css" />
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo-container">
            <img src="images/logo.svg" alt="English Blossoms" class="logo" />
        </div>

        <nav class="nav">
            <a href="index.html" class="active">ホーム</a>
            <a href="courses.html">クラス案内</a>
            <a href="fees.html">料金</a>
            <a href="contact.html">お問い合わせ</a>
        </nav>
    </header>

    <!-- HERO / CAROUSEL -->
    <section class="carousel">
        <div class="carousel-track">
            <img src="images/photo1.jpg" alt="Class photo" />
            <img src="images/photo2.jpg" alt="Class photo" />
            <img src="images/photo3.jpg" alt="Class photo" />
        </div>
    </section>

    <!-- ABOUT SECTION -->
    <section class="about">
        <h2>Welcome to English Blossoms</h2>
        <p>
            福岡市の小さな英会話スクール「English Blossoms」へようこそ。
            子どもたちが安心して学べる、あたたかい雰囲気のスクールです。
        </p>
    </section>

    <!-- MAP -->
    <section class="map-section">
        <h2>アクセス</h2>
        <div class="map-container">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3324.3775739063935!2d130.41283187618268!3d33.56954464306312!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3541910bd0752fd5%3A0xfd8d34cd1b48b5f2!2z44CSODE1LTAwODIgRnVrdW9rYSwgTWluYW1pIFdhcmQsIMWMZ3VzdSwgMy1jaMWNbWXiiJI44oiSMTMg44Ko44Or44OV6Jek!5e0!3m2!1sen!2sjp!4v1781195790646!5m2!1sen!2sjp"
                width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
    </section>

    <!-- SOCIAL -->
    <section class="social">
        <h2>LINE・Instagram</h2>
        <p>最新情報やお問い合わせはLINE・Instagramからどうぞ。</p>
        <div class="social-links">
            <a href="https://lin.ee/tBtMvqM" target="_blank">LINE</a>
            <a href="https://www.instagram.com/englishblossomsfukuoka/" target="_blank">Instagram</a>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer dark">
        <p>© 2026 English Blossoms</p>
    </footer>

    <!-- BACK TO TOP -->
    <div id="back-to-top">↑</div>
    <script>
        document.getElementById("back-to-top").onclick = () => {
            window.scrollTo({ top: 0, behavior: "smooth" });
        };
    </script>

    <!-- FIXED CAROUSEL SCRIPT -->
    <script>
        const track = document.querySelector(".carousel-track");
        const slides = track.children;
        let index = 0;

        setInterval(() => {
            index = (index + 1) % slides.length;
            track.style.transform = `translateX(-${index * 100}%)`;
        }, 5000); // slower, smoother
    </script>

</body>

</html>
